<script type="text/babel" data-presets="react">

const { useState, useEffect, useCallback, useMemo } = React;


/* ─────────────────────────────────────────────────────────
   STYLES

const CSS = `

th{padding:9px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);font-weight:700;text-align:left;border-bottom:1px solid var(--br)}

/* overlay / modal */

/* ── BOTTOM NAV (mobile only) ── */

.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--mu2);cursor:pointer;padding:6px 2px;transition:.16s;font-size:10px;font-weight:600;font-family:inherit;-webkit-tap-highlight-color:transparent;border-radius:0}
.bn-item.on{color:var(--gold)}

/* ── FLOATING BUTTON ── */
@keyframes fabIn{0%{opacity:0;transform:translateY(20px) scale(.85)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes ring{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.55);opacity:0}100%{opacity:0}}
@keyframes fabPulse{0%,100%{box-shadow:0 6px 28px rgba(0,136,204,.55)}50%{box-shadow:0 8px 36px rgba(0,136,204,.85),0 0 0 6px rgba(0,136,204,.15)}}
.fab-wrap{position:fixed;bottom:22px;right:16px;z-index:300;animation:fabIn .5s cubic-bezier(.34,1.56,.64,1) both}
.fab-ring{position:absolute;inset:0;border-radius:50px;border:2px solid rgba(0,136,204,.5);animation:ring 2.4s ease-out infinite;pointer-events:none}
.fab-btn{position:relative;display:flex;align-items:center;gap:9px;padding:12px 18px;border-radius:50px;background:linear-gradient(135deg,#0ea5e9,#0077b6);color:#fff;border:none;cursor:pointer;font-weight:800;font-size:13.5px;letter-spacing:.2px;box-shadow:0 6px 28px rgba(0,136,204,.55),0 2px 8px rgba(0,0,0,.3);animation:fabPulse 3s ease infinite;transition:transform .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fab-btn:active{transform:scale(.95)}
.fab-icon{width:26px;height:26px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fab-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;border:1.5px solid rgba(255,255,255,.7);position:absolute;top:8px;right:8px;box-shadow:0 0 6px #22c55e}

.tg-banner{background:linear-gradient(135deg,rgba(0,136,204,.18),rgba(0,100,160,.1));border:1px solid rgba(14,165,233,.3);border-radius:var(--r12);padding:14px 16px;display:flex;align-items:center;gap:12px}

  .app-main{margin-left:0 !important}
  .bottom-nav{display:flex}
  .page-content{padding:12px 12px;padding-bottom:calc(var(--nav-h) + 76px)}
  .desk-only{display:none !important}
  .fab-wrap{bottom:calc(var(--nav-h) + 10px);right:12px}
  .fab-btn{padding:11px 15px;font-size:13px;gap:8px}
  .top-bar{padding:10px 14px}
  input,select{font-size:16px}

/* ─────────────────────────────────────────────────────────
   DATA
───────────────────────────────────────────────────────── */
const K={U:"ctb_u",A:"ctb_a",S:"ctb_s",TX:"ctb_tx",M:"ctb_m",B:"ctb_b"};
const db={
  g(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  s(k,v){localStorage.setItem(k,JSON.stringify(v))},
};
function boot(){
  if(!db.g(K.A)) db.s(K.A,{user:"admin",pass:btoa("Admin@1234"),name:"Admin"});
  if(!db.g(K.U)) db.s(K.U,[]);
  if(!db.g(K.TX)) db.s(K.TX,[]);
  if(!db.g(K.B)) db.s(K.B,[]);
  if(!db.g(K.M)) db.s(K.M,[]);
}
const uid=()=>"UID"+Math.floor(100000+Math.random()*900000);
const nid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const money=(n)=>Number(n||0).toLocaleString("en-IN");
const dt=(d)=>new Date(d).toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
const dtFull=(d)=>d?new Date(d).toLocaleString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:true}):"—";

/* ─────────────────────────────────────────────────────────
   SCHEDULE HELPERS
───────────────────────────────────────────────────────── */
function schedStatus(m){
  if(!m.startTime&&!m.endTime) return null;
  const now=Date.now(),st=m.startTime?+new Date(m.startTime):null,en=m.endTime?+new Date(m.endTime):null;
  if(st&&now<st) return "upcoming";
  if(en&&now>en) return "ended";
  if(st&&now>=st) return "live";
  return null;
}
function SchedBadge({m}){
  const s=schedStatus(m); if(!s) return null;
  const C={upcoming:{c:"bb",t:"🕐 Upcoming"},live:{c:"br",t:"🔴 Live"},ended:{c:"bm",t:"⏱ Ended"}};
  return <span className={`badge ${C[s].c}`}>{C[s].t}</span>;
}
function Countdown({to,label,col}){
  const[v,setV]=useState("");
  useEffect(()=>{
    const tick=()=>{
      const d=+new Date(to)-Date.now();
      if(d<=0){setV("Now");return;}
      const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
      setV(`${h?h+"h ":""}${m?m+"m ":""}${s}s`);
    };
    tick();const t=setInterval(tick,1000);return()=>clearInterval(t);
  },[to]);
  return <span style={{fontSize:"11.5px",color:col||"var(--gold)",fontWeight:700,fontFamily:"monospace"}}>{label}: {v}</span>;
}

/* ─────────────────────────────────────────────────────────
   ROOT
───────────────────────────────────────────────────────── */
function App(){
  const[screen,setScreen]=useState("login");
  const[sess,setSess]=useState(null);
  const[toast,setToast]=useState(null);

  useEffect(()=>{
    // Ensure proper mobile viewport
    let vm=document.querySelector('meta[name="viewport"]');
    if(!vm){vm=document.createElement('meta');vm.name='viewport';document.head.appendChild(vm);}
    vm.content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no';
    boot();
    const s=db.g(K.S);
    if(s){setSess(s);setScreen(s.type==="admin"?"admin":"user");}
  },[]);

  const notify=useCallback((msg,type="g")=>{
    setToast({msg,type,k:Date.now()});
    setTimeout(()=>setToast(null),3000);
  },[]);

  const login=(s)=>{setSess(s);db.s(K.S,s);setScreen(s.type==="admin"?"admin":"user");};
  const logout=()=>{setSess(null);db.s(K.S,null);setScreen("login");notify("Logged out","b");};

  return(
    <>
      <style>{CSS}</style>
      {toast&&<div className={`toast t${toast.type}`} key={toast.k}>{toast.msg}</div>}
      {screen==="login"      &&<LoginPage  onLogin={login} toReg={()=>setScreen("reg")} toAdmin={()=>setScreen("al")} notify={notify}/>}
      {screen==="reg"        &&<RegPage    onLogin={login} back={()=>setScreen("login")} notify={notify}/>}
      {screen==="al"         &&<AdminLoginPage onLogin={login} back={()=>setScreen("login")} notify={notify}/>}
      {screen==="user"  &&sess&&<UserShell  sess={sess} logout={logout} notify={notify}/>}
      {screen==="admin" &&sess&&<AdminShell sess={sess} logout={logout} notify={notify}/>}
    </>
  );
}

/* ─────────────────────────────────────────────────────────
   AUTH
───────────────────────────────────────────────────────── */
function AuthCard({icon,title,sub,children}){
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",
      background:"radial-gradient(ellipse 90% 50% at 50% -5%,rgba(245,158,11,.07),transparent)"}}>
      <div style={{width:"100%",maxWidth:"420px"}} className="fu">
        <div style={{textAlign:"center",marginBottom:"24px"}}>
          <div style={{fontSize:"34px",marginBottom:"8px"}}>{icon}</div>
          <h1 style={{fontFamily:"'Syne'",fontSize:"20px",color:"var(--gold)",fontWeight:800}}>{title}</h1>
          {sub&&<p style={{color:"var(--mu)",marginTop:"3px",fontSize:"13px"}}>{sub}</p>}
        </div>
        <div className="card" style={{padding:"24px"}}>{children}</div>
      </div>
    </div>
  );
}
function F({label,mb=14,children}){return <div style={{marginBottom:mb+"px"}}><label>{label}</label>{children}</div>;}
function PwF({value,onChange,ph="Password",onEnter}){
  const[show,setShow]=useState(false);
  return(
    <div style={{position:"relative"}}>
      <input type={show?"text":"password"} value={value} onChange={onChange} placeholder={ph} style={{paddingRight:"42px"}} onKeyDown={e=>e.key==="Enter"&&onEnter?.()}/>
      <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:"11px",top:"50%",transform:"translateY(-50%)",background:"none",color:"var(--mu)",fontSize:"13px",padding:"3px",lineHeight:1}}>{show?"🙈":"👁️"}</button>
    </div>
  );
}

function LoginPage({onLogin,toReg,toAdmin,notify}){
  const[f,setF]=useState({u:"",p:""});
  const[busy,set]=useState(false);
  const go=()=>{
    if(!f.u||!f.p)return notify("Fill all fields","a");
    set(true);
    setTimeout(()=>{
      const us=db.g(K.U)||[];
      const u=us.find(x=>x.username.toLowerCase()===f.u.toLowerCase());
      if(!u){notify("User not found","r");set(false);return;}
      if(u.pass!==btoa(f.p)){notify("Wrong password","r");set(false);return;}
      if(u.banned){notify("Account suspended. Contact admin.","r");set(false);return;}
      onLogin({type:"user",data:u});notify(`Welcome, ${u.nickname||u.username}! 🏏`);set(false);
    },420);
  };
  return(
    <AuthCard icon="🏏" title="Cricket Toss Book" sub="Sign in to your account">
      <F label="Username"><input value={f.u} onChange={e=>setF(p=>({...p,u:e.target.value}))} placeholder="Enter username" onKeyDown={e=>e.key==="Enter"&&go()}/></F>
      <F label="Password" mb={20}><PwF value={f.p} onChange={e=>setF(p=>({...p,p:e.target.value}))} onEnter={go}/></F>
      <button className="btn btn-gold btn-w btn-lg" onClick={go} disabled={busy}>{busy?"Signing in…":"Sign In"}</button>
      <hr/>
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        <button className="btn btn-ghost btn-w" onClick={toReg}>📝 Create Account</button>
        <button className="btn btn-ghost btn-w btn-sm" onClick={toAdmin} style={{color:"var(--mu)",fontSize:"12px"}}>🛡️ Admin Panel</button>
      </div>
    </AuthCard>
  );
}

function RegPage({onLogin,back,notify}){
  const[f,setF]=useState({u:"",nick:"",p:"",c:""});
  const[busy,set]=useState(false);
  const str=useMemo(()=>f.p?[f.p.length>=6,/[A-Z]/.test(f.p),/\d/.test(f.p),/[^A-Za-z0-9]/.test(f.p)].filter(Boolean).length:0,[f.p]);
  const go=()=>{
    if(!f.u||!f.p||!f.c)return notify("Fill required fields","a");
    if(f.u.length<4)return notify("Username min 4 chars","a");
    if(f.p.length<6)return notify("Password min 6 chars","a");
    if(!/[A-Z]/.test(f.p))return notify("Password needs uppercase letter","a");
    if(!/\d/.test(f.p))return notify("Password needs a number","a");
    if(f.p!==f.c)return notify("Passwords don't match","r");
    set(true);
    setTimeout(()=>{
      const us=db.g(K.U)||[];
      if(us.find(x=>x.username.toLowerCase()===f.u.toLowerCase())){notify("Username taken","r");set(false);return;}
      const nu={uid:uid(),username:f.u,nickname:f.nick||f.u,pass:btoa(f.p),balance:0,createdAt:new Date().toISOString(),banned:false};
      us.push(nu);db.s(K.U,us);
      onLogin({type:"user",data:nu});notify("Welcome to Cricket Toss Book! 🎉");set(false);
    },420);
  };
  return(
    <AuthCard icon="🏏" title="Create Account" sub="Join Cricket Toss Book">
      <F label="Username *"><input value={f.u} onChange={e=>setF(p=>({...p,u:e.target.value}))} placeholder="Min 4 characters"/></F>
      <F label="Nickname"><input value={f.nick} onChange={e=>setF(p=>({...p,nick:e.target.value}))} placeholder="Display name (optional)"/></F>
      <F label="Password *"><PwF value={f.p} onChange={e=>setF(p=>({...p,p:e.target.value}))} ph="Uppercase + number, min 6"/></F>
      {f.p&&<div style={{marginBottom:"10px"}}>
        <div style={{height:"3px",background:"var(--c3)",borderRadius:"3px",overflow:"hidden",marginBottom:"4px"}}>
          <div style={{height:"100%",width:str*25+"%",borderRadius:"3px",transition:"width .3s",background:str<2?"var(--rd)":str<4?"var(--gold)":"var(--gr)"}}/>
        </div>
        <div style={{fontSize:"11px",color:"var(--mu)"}}>Password strength: <span style={{color:str<2?"var(--rd)":str<4?"var(--gold)":"var(--gr)",fontWeight:700}}>{["","Weak","Fair","Good","Strong"][str]}</span></div>
      </div>}
      <F label="Confirm Password *" mb={20}><PwF value={f.c} onChange={e=>setF(p=>({...p,c:e.target.value}))} ph="Repeat password" onEnter={go}/></F>
      <button className="btn btn-gr btn-w btn-lg" onClick={go} disabled={busy}>{busy?"Creating…":"Create Account"}</button>
      <div style={{textAlign:"center",marginTop:"14px"}}><button className="btn btn-ghost btn-sm" onClick={back}>← Back to Login</button></div>
    </AuthCard>
  );
}

function AdminLoginPage({onLogin,back,notify}){
  const[f,setF]=useState({u:"",p:""});

  const go=()=>{
    if(!f.u||!f.p)return notify("Fill all fields","a");

  const go=()=>{
    const a=parseInt(amt);
    if(!sel)return notify("Select a match","a");

      const bs=db.g(K.B)||[];bs.push(bet);db.s(K.B,bs);

      db.s(K.TX,tx);
      notify(`Bet placed ₹${a} on ${bet.label} 🎯`);

/* ─── MATCHES + SETTLEMENT ─── */
function AMatches({notify}){
  const[ms,setMs]=useState(db.g(K.M)||[]);
  const[addOpen,setAdd]=useState(false);
  const EF={teamA:"",teamB:"",rate:"1.9",startTime:"",endTime:""};
  const[form,setForm]=useState(EF);
  const[panels,setPanels]=useState({}); // matchId -> "settle"|"bets"|"sched"|null
  const[rateIn,setRateIn]=useState({});
  const[schedIn,setSchedIn]=useState({});
  // settlement state per match
  const[winner,setWinner]=useState({}); // matchId -> "A"|"B"
  const[settled,setSettled]=useState({}); // matchId -> result object after settling

  const reload=()=>setMs(db.g(K.M)||[]);
  const togglePanel=(id,name)=>setPanels(p=>({...p,[id]:p[id]===name?null:name}));

  /* ── ADD ── */
  const addMatch=()=>{
    if(!form.teamA.trim()||!form.teamB.trim())return notify("Enter both team names","a");
    const r=parseFloat(form.rate);
    if(!r||r<1)return notify("Rate must be ≥ 1","a");
    if(form.startTime&&form.endTime&&new Date(form.startTime)>=new Date(form.endTime))
      return notify("End time must be after start time","a");
    const m={id:nid(),teamA:form.teamA.trim(),teamB:form.teamB.trim(),rate:r,status:"open",winner:null,
      startTime:form.startTime||null,endTime:form.endTime||null,createdAt:new Date().toISOString()};
    const all=[...ms,m];db.s(K.M,all);setMs(all);
    setForm(EF);setAdd(false);notify("Match added ✅");
  };

  /* ── RATE ── */
  const changeRate=(id)=>{
    const r=parseFloat(rateIn[id]);
    if(!r||r<1)return notify("Rate must be ≥ 1","a");
    const all=ms.map(m=>m.id===id?{...m,rate:r}:m);db.s(K.M,all);setMs(all);
    setRateIn(p=>({...p,[id]:""}));notify("Rate updated ✅");
  };

  /* ── SCHEDULE ── */
  const saveSchedule=(id)=>{
    const sv=schedIn[id]||{};
    if(sv.startTime&&sv.endTime&&new Date(sv.startTime)>=new Date(sv.endTime))
      return notify("End time must be after start time","a");
    const all=ms.map(m=>m.id===id?{...m,
      startTime:sv.startTime!==undefined?sv.startTime||null:m.startTime,
      endTime:sv.endTime!==undefined?sv.endTime||null:m.endTime}:m);
    db.s(K.M,all);setMs(all);notify("Schedule saved ✅");
  };

  /* ── STATUS ── */
  const lockM=(id)=>{const all=ms.map(m=>m.id===id?{...m,status:"locked"}:m);db.s(K.M,all);setMs(all);notify("Locked 🔒");};
  const openM=(id)=>{const all=ms.map(m=>m.id===id?{...m,status:"open"}:m);db.s(K.M,all);setMs(all);notify("Reopened ✅");};

  /* ── SETTLE ── */
  const doSettle=(matchId)=>{
    const w=winner[matchId];
    if(!w)return notify("Select winner first","a");

    const match=ms.find(m=>m.id===matchId);
    if(!match)return;

    // Read fresh data
    const allBets=db.g(K.B)||[];
    const allUsers=db.g(K.U)||[];
    const allTx=db.g(K.TX)||[];

    const pending=allBets.filter(b=>b.matchId===matchId&&b.status==="pending");
    if(pending.length===0)return notify("No pending bets to settle","a");

    const winnerName=w==="A"?match.teamA:match.teamB;
    let wins=0,losses=0,totalPayout=0;

    // Process each pending bet
    allBets.forEach(b=>{
      if(b.matchId!==matchId||b.status!=="pending") return;
      const isWin=(b.choice===w);
      b.status=isWin?"won":"lost";
      b.settledAt=new Date().toISOString();
      if(isWin){
        const ui=allUsers.findIndex(u=>u.uid===b.userId);
        if(ui>-1){
          allUsers[ui].balance=(allUsers[ui].balance||0)+b.payout;
          totalPayout+=b.payout;
          wins++;
          allTx.push({id:nid(),userId:b.userId,username:b.username,amount:b.payout,
            note:`Win: ${match.teamA} vs ${match.teamB}`,type:"win",date:new Date().toISOString()});
        }
      } else losses++;
    });

    // Update match status
    const updMatches=ms.map(m=>m.id===matchId?{...m,status:"settled",winner:w,settledAt:new Date().toISOString()}:m);

    // Save everything
    db.s(K.B,allBets);
    db.s(K.U,allUsers);
    db.s(K.TX,allTx);
    db.s(K.M,updMatches);
    setMs(updMatches);

    // Store result and close panel
    setSettled(p=>({...p,[matchId]:{wins,losses,totalPayout,winnerName}}));
    setPanels(p=>({...p,[matchId]:null}));
    setWinner(p=>({...p,[matchId]:undefined}));
    notify(`✅ Settled! ${wins} won · ${losses} lost · ₹${money(Math.round(totalPayout))} paid out`);
  };

  /* ── DELETE ── */
  const delMatch=(id)=>{
    if(!window.confirm("Delete this match?"))return;
    const all=ms.filter(m=>m.id!==id);db.s(K.M,all);setMs(all);notify("Deleted","a");
  };

  const SC={open:{c:"bg",dot:"#10b981",l:"Open"},locked:{c:"bgo",dot:"#f59e0b",l:"Locked"},settled:{c:"bm",dot:"#64748b",l:"Settled"}};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}}>
        <span className="sec">🏏 Matches</span>
        <button className="btn btn-gold btn-sm" onClick={()=>setAdd(s=>!s)}>{addOpen?"✕ Cancel":"+ Add Match"}</button>
      </div>

      {/* ── Add Form ── */}
      {addOpen&&(
        <div className="card" style={{padding:"20px",borderColor:"rgba(245,158,11,.3)"}}>
          <div style={{fontWeight:800,fontSize:"14px",color:"var(--gold)",marginBottom:"14px"}}>🏏 New Toss Match</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"10px",marginBottom:"14px"}}>
            <div><label>Team A</label><input value={form.teamA} onChange={e=>setForm(p=>({...p,teamA:e.target.value}))} placeholder="e.g. India"/></div>
            <div><label>Team B</label><input value={form.teamB} onChange={e=>setForm(p=>({...p,teamB:e.target.value}))} placeholder="e.g. Pakistan"/></div>
            <div><label>Rate (x)</label><input type="number" step="0.05" min="1" value={form.rate} onChange={e=>setForm(p=>({...p,rate:e.target.value}))}/></div>
          </div>
          <div style={{background:"var(--c2)",border:"1px solid var(--br)",borderRadius:"var(--r8)",padding:"14px",marginBottom:"14px"}}>
            <div style={{fontSize:"11.5px",fontWeight:700,color:"var(--mu2)",marginBottom:"10px"}}>🕐 SCHEDULE (optional)</div>

            {/* ══ BETS PANEL ══ */}
            {curPanel==="bets"&&(

/* ── BET HISTORY ── */
function ABets(){
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const all=(db.g(K.B)||[]).slice().reverse();
  const rows=all.filter(b=>{
    if(filter!=="all"&&b.status!==filter)return false;
    if(search&&!b.username?.toLowerCase().includes(search.toLowerCase())&&!(b.teamA+" "+b.teamB).toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"6px"}}>
        <span className="sec">🪙 Bet History</span>
        <span style={{fontSize:"12px",color:"var(--mu)"}}>{rows.length} bets · ₹{money(rows.reduce((s,b)=>s+b.amount,0))} staked</span>
      </div>
      <div style={{display:"flex",gap:"7px",flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:1,minWidth:"160px"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search user or match…"/></div>
        <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
          {["all","pending","won","lost"].map(f=>(
            <button key={f} className={`btn btn-sm ${filter===f?"btn-gold":"btn-ghost"}`} onClick={()=>setFilter(f)} style={{textTransform:"capitalize"}}>{f}</button>
          ))}
        </div>
      </div>
      <div className="card" style={{overflow:"hidden"}}>
        {rows.length===0
          ?<div style={{padding:"36px",textAlign:"center",color:"var(--mu)"}}>No bets found</div>
          :<div className="tbl-wrap"><table>
            <thead><tr><th>User</th><th>Match</th><th>Choice</th><th>Stake</th><th>Payout</th><th>Rate</th><th>Status</th><th>Date</th></tr></thead>
            <tbody>{rows.slice(0,100).map(b=>(
              <tr key={b.id}>
                <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{b.username}</td>
                <td style={{fontSize:"12px",color:"var(--mu2)",whiteSpace:"nowrap"}}>{b.teamA} vs {b.teamB}</td>
                <td><span className={`badge ${b.choice==="A"?"bg":"bb"}`}>{b.label}</span></td>
                <td style={{fontWeight:600}}>₹{money(b.amount)}</td>
                <td style={{color:"var(--gr)"}}>₹{b.payout?.toFixed(2)}</td>
                <td style={{color:"var(--gold)"}}>{b.rate}x</td>
                <td><span className={`badge ${b.status==="won"?"bg":b.status==="lost"?"br":"bgo"}`}>{b.status}</span></td>
                <td style={{color:"var(--mu)",fontSize:"11.5px",whiteSpace:"nowrap"}}>{dt(b.createdAt)}</td>
              </tr>
            ))}</tbody>
          </table></div>
        }
      </div>
    </div>
  );
}

/* ── BALANCE ── */
function ABalance({notify}){
  const[users,setUsers]=useState(db.g(K.U)||[]);
  const[uid2,setUid2]=useState("");
  const[type,setType]=useState("add");
  const[amt,setAmt]=useState("");
  const[note,setNote]=useState("");
  const[histUid,setHistUid]=useState("");
  const[search,setSrch]=useState("");
  const reload=()=>setUsers(db.g(K.U)||[]);
  const selU=users.find(u=>u.uid===uid2);
  const filtered=search.trim()?users.filter(u=>u.username.toLowerCase().includes(search.toLowerCase())||u.uid.toLowerCase().includes(search.toLowerCase())):users;
  const adjust=()=>{
    const a=parseInt(amt);
    if(!uid2)return notify("Select a user","a");
    if(!a||a<1)return notify("Enter valid amount","a");
    const all=db.g(K.U)||[];const i=all.findIndex(u=>u.uid===uid2);
    if(type==="deduct"&&(all[i].balance||0)<a)return notify("Insufficient user balance","r");
    const ch=type==="add"?a:-a;
    all[i].balance=(all[i].balance||0)+ch;db.s(K.U,all);
    const tx=db.g(K.TX)||[];
    tx.push({id:nid(),userId:uid2,username:all[i].username,amount:ch,note:note||(type==="add"?"Admin Credit":"Admin Debit"),type:type==="add"?"credit":"debit",date:new Date().toISOString(),byAdmin:true});
    db.s(K.TX,tx);reload();setAmt("");setNote("");
    notify(`₹${a} ${type==="add"?"added to":"deducted from"} ${all[i].username}`);
  };
  const histTx=histUid?(db.g(K.TX)||[]).filter(t=>t.userId===histUid).reverse():[];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
      <span className="sec">💰 Balance Management</span>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"14px",alignItems:"start"}}>
        <div className="card" style={{padding:"20px"}}>
          <div style={{fontWeight:700,fontSize:"13.5px",marginBottom:"14px"}}>Adjust Balance</div>
          <F label="Search User"><input value={search} onChange={e=>setSrch(e.target.value)} placeholder="Filter by username or UID…"/></F>
          <F label="Select User">
            <select value={uid2} onChange={e=>setUid2(e.target.value)}>
              <option value="">-- Select user --</option>
              {filtered.map(u=><option key={u.uid} value={u.uid}>{u.username} ({u.uid}) — ₹{money(u.balance)}</option>)}
            </select>
          </F>
          {selU&&(
            <div style={{display:"flex",justifyContent:"space-between",padding:"9px 13px",background:"var(--c3)",borderRadius:"var(--r8)",marginBottom:"12px"}}>
              <span style={{fontSize:"12px",color:"var(--mu2)"}}>Current Balance</span>
              <span style={{fontWeight:800,color:"var(--gold)"}}>₹{money(selU.balance)}</span>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"12px"}}>
            <button className={`btn ${type==="add"?"btn-gr":"btn-ghost"}`} onClick={()=>setType("add")}>+ Add</button>
            <button className={`btn ${type==="deduct"?"btn-rd":"btn-ghost"}`} onClick={()=>setType("deduct")}>− Deduct</button>
          </div>

}

/* ── USERS ── */
function AUsers({notify}){
  const[users,setUsers]=useState(db.g(K.U)||[]);
  const[search,setSrch]=useState("");
  // Password reset modal state
  const[pwModal,setPwModal]=useState(null); // {uid, username} | null
  const[newPw,setNewPw]=useState("");
  const[customPw,setCustomPw]=useState("");
  const[pwDone,setPwDone]=useState(null); // {password} after reset
  // Delete confirm modal
  const[delModal,setDelModal]=useState(null); // {uid, username} | null
  const[delConfirmText,setDelConfirmText]=useState("");

  const reload=()=>setUsers(db.g(K.U)||[]);

  /* Generate a random temp password */
  const genPw=()=>{
    const chars="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";
    const specials="@#!";
    let p=specials[Math.floor(Math.random()*specials.length)];
    for(let i=0;i<7;i++) p+=chars[Math.floor(Math.random()*chars.length)];
    // shuffle
    return p.split("").sort(()=>Math.random()-.5).join("");
  };

  /* Open reset modal */
  const openReset=(u)=>{
    const auto=genPw();
    setPwModal({uid:u.uid,username:u.username});
    setNewPw(auto); setCustomPw(""); setPwDone(null);
  };

  /* Apply password reset */
  const doReset=()=>{
    const finalPw=(customPw.trim()||newPw).trim();
    if(finalPw.length<4){notify("Password must be at least 4 chars","a");return;}
    const all=db.g(K.U)||[];
    const i=all.findIndex(u=>u.uid===pwModal.uid);
    if(i===-1)return;
    all[i].pass=btoa(finalPw);
    db.s(K.U,all);
    reload();
    setPwDone({password:finalPw});
    notify(`Password reset for ${all[i].username} ✅`);
  };

  /* Copy to clipboard */
  const copyPw=(text)=>{
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>notify("Copied to clipboard ✅")).catch(()=>{});
    }
  };

  /* Ban/Unban */
  const ban=(uid3)=>{
    const all=db.g(K.U)||[];const i=all.findIndex(u=>u.uid===uid3);
    all[i].banned=!all[i].banned;db.s(K.U,all);reload();
    notify(all[i].banned?"User banned":"User unbanned",all[i].banned?"r":"g");
  };

  /* Reset balance */
  const resetBal=(uid3)=>{
    if(!window.confirm("Reset balance to ₹0?"))return;
    const all=db.g(K.U)||[];const i=all.findIndex(u=>u.uid===uid3);
    all[i].balance=0;db.s(K.U,all);reload();notify("Balance reset","a");
  };

  /* Open delete confirm */
  const openDelete=(u)=>{setDelModal({uid:u.uid,username:u.username});setDelConfirmText("");};

  /* Execute delete */
  const doDelete=()=>{
    if(delConfirmText.trim().toLowerCase()!=="delete"){
      notify("Type DELETE to confirm","r");return;
    }
    const allU=(db.g(K.U)||[]).filter(u=>u.uid!==delModal.uid);
    const allB=(db.g(K.B)||[]).filter(b=>b.userId!==delModal.uid);
    const allTX=(db.g(K.TX)||[]).filter(t=>t.userId!==delModal.uid);
    db.s(K.U,allU);db.s(K.B,allB);db.s(K.TX,allTX);
    reload();setDelModal(null);setDelConfirmText("");
    notify(`User "${delModal.username}" deleted permanently`,"r");
  };

  const fil=search.trim()
    ?users.filter(u=>u.username.toLowerCase().includes(search.toLowerCase())
      ||u.uid.toLowerCase().includes(search.toLowerCase())
      ||(u.nickname||"").toLowerCase().includes(search.toLowerCase()))
    :users;

  return(
    <>
      {/* ── Password Reset Modal ── */}
      {pwModal&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&!pwDone&&setPwModal(null)}>
          <div className="modal">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"18px"}}>
              <div style={{fontFamily:"'Syne'",fontWeight:800,fontSize:"16px"}}>🔑 Reset Password</div>
              {!pwDone&&<button onClick={()=>setPwModal(null)} style={{background:"none",color:"var(--mu)",fontSize:"18px",padding:"2px",lineHeight:1}}>✕</button>}
            </div>

            {/* User info */}
            <div style={{background:"var(--c2)",border:"1px solid var(--br)",borderRadius:"var(--r8)",padding:"11px 14px",marginBottom:"16px",display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{width:"34px",height:"34px",borderRadius:"50%",background:"var(--gold)",color:"#000",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:"15px",flexShrink:0}}>
                {pwModal.username[0].toUpperCase()}
              </div>
              <div>
                <div style={{fontWeight:700,fontSize:"13.5px"}}>{pwModal.username}</div>
                <div style={{fontSize:"11px",color:"var(--mu)",fontFamily:"monospace"}}>{pwModal.uid}</div>
              </div>
            </div>

            {!pwDone?(
              <>
                {/* Auto-generated password */}
                <div style={{marginBottom:"14px"}}>
                  <label>AUTO-GENERATED PASSWORD</label>
                  <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                    <div style={{flex:1,padding:"10px 14px",background:"var(--c3)",border:"1px solid var(--br)",borderRadius:"var(--r8)",fontFamily:"monospace",fontSize:"15px",fontWeight:700,color:"var(--gold)",letterSpacing:"1px"}}>
                      {newPw}
                    </div>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setNewPw(genPw())} title="Generate new">🔄</button>
                  </div>
                  <div style={{fontSize:"11px",color:"var(--mu)",marginTop:"4px"}}>Click 🔄 to generate a different password</div>
                </div>

                {/* OR custom password */}
                <div style={{marginBottom:"16px"}}>
                  <label>OR SET CUSTOM PASSWORD</label>
                  <input
                    value={customPw}
                    onChange={e=>setCustomPw(e.target.value)}

                  />
                  <div style={{fontSize:"11px",color:"var(--mu)",marginTop:"4px"}}>
                    If filled, this will be used instead of the auto-generated one
                  </div>
                </div>

                {/* Preview */}
                <div style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.2)",borderRadius:"var(--r8)",padding:"10px 14px",marginBottom:"16px",fontSize:"12.5px"}}>
                  <span style={{color:"var(--mu2)"}}>Will set password to: </span>
                  <span style={{fontWeight:800,color:"var(--gold)",fontFamily:"monospace"}}>{customPw.trim()||newPw}</span>
                </div>

                <div style={{display:"flex",gap:"8px"}}>
                  <button className="btn btn-rd btn-w btn-lg" style={{fontWeight:800}} onClick={doReset}>
                    🔑 Reset Password
                  </button>
                  <button className="btn btn-ghost" onClick={()=>setPwModal(null)}>Cancel</button>
                </div>
              </>
            ):(
              /* ── Success State ── */
              <>
                <div style={{background:"var(--grT)",border:"1px solid rgba(16,185,129,.3)",borderRadius:"var(--r12)",padding:"18px",marginBottom:"16px",textAlign:"center"}}>
                  <div style={{fontSize:"28px",marginBottom:"6px"}}>✅</div>
                  <div style={{fontWeight:800,fontSize:"15px",color:"var(--gr)",marginBottom:"4px"}}>Password Reset Successfully</div>

                </div>

                {/* Credentials box */}
                <div style={{background:"var(--c2)",border:"1px solid var(--br)",borderRadius:"var(--r8)",padding:"14px",marginBottom:"16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                    <span style={{fontSize:"11px",fontWeight:700,color:"var(--mu2)",letterSpacing:".5px"}}>CREDENTIALS</span>
                    <button className="btn btn-ghost btn-sm" onClick={()=>copyPw(`Username: ${pwModal.username}\nPassword: ${pwDone.password}`)}>📋 Copy All</button>

                  <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--c3)",borderRadius:"var(--r8)"}}>
                      <span style={{fontSize:"12px",color:"var(--mu)"}}>Username</span>
                      <span style={{fontWeight:700,fontFamily:"monospace",fontSize:"13.5px"}}>{pwModal.username}</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--c3)",borderRadius:"var(--r8)"}}>
                      <span style={{fontSize:"12px",color:"var(--mu)"}}>New Password</span>
                      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>

                        <button className="btn btn-ghost btn-sm" onClick={()=>copyPw(pwDone.password)}>📋</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div style={{fontSize:"12px",color:"var(--mu)",marginBottom:"16px",padding:"9px 12px",background:"var(--rdT)",borderRadius:"var(--r8)",border:"1px solid rgba(244,63,94,.2)"}}>
                  ⚠️ Tell the user to change their password after logging in.
                </div>

                <button className="btn btn-ghost btn-w" onClick={()=>setPwModal(null)}>Close</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* ── Delete Confirm Modal ── */}
      {delModal&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setDelModal(null)}>
          <div className="modal">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"18px"}}>
              <div style={{fontFamily:"'Syne'",fontWeight:800,fontSize:"16px",color:"var(--rd)"}}>🗑️ Delete User</div>
              <button onClick={()=>setDelModal(null)} style={{background:"none",color:"var(--mu)",fontSize:"18px",padding:"2px",lineHeight:1}}>✕</button>
            </div>

            {/* Warning */}
            <div style={{background:"var(--rdT)",border:"1px solid rgba(244,63,94,.25)",borderRadius:"var(--r8)",padding:"14px",marginBottom:"16px"}}>
              <div style={{fontWeight:700,fontSize:"13.5px",color:"var(--rd)",marginBottom:"6px"}}>⚠️ This action is permanent</div>
              <div style={{fontSize:"13px",color:"var(--mu2)",lineHeight:1.6}}>
                Deleting <strong style={{color:"var(--tx)"}}>{delModal.username}</strong> will permanently remove:

          {fil.length===0

      </div>
      <div className="card" style={{padding:"18px",borderColor:"rgba(244,63,94,.25)"}}>
        <div style={{fontWeight:700,fontSize:"13.5px",color:"var(--rd)",marginBottom:"6px"}}>⚠️ Danger Zone</div>
        <div style={{fontSize:"13px",color:"var(--mu2)",marginBottom:"13px"}}>Permanently deletes all users, bets, and transactions.</div>
        <button className="btn btn-rd" onClick={clearAll}>🗑️ Clear All Data</button>
      </div>
    </div>
  );
}


// ── Mount ──
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));

// ── Hide splash after render ──
setTimeout(()=>{
  const s = document.getElementById('splash');
  if(s){ s.classList.add('hidden'); setTimeout(()=>s.remove(), 450); }
}, 900);
</script>

</body>
